name: frontend-tests

on:
  push:
    branches: [main]
    paths:
      - 'chartsentinel/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    paths:
      - 'chartsentinel/**'
      - '.github/workflows/frontend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chartsentinel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chartsentinel/package-lock.json

      - run: npm ci

      - run: npm test
