<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ChartSentinel | Step 1: Watch &amp; Register</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00f2ff", // Cyan color from the design
                        "background-light": "#f8fafc",
                        "background-dark": "#050505",
                        "surface-dark": "#121212",
                        "input-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
    <style>
        .grid-bg {
            background-image: linear-gradient(to bottom, rgba(0, 242, 255, 0.1) 1px, transparent 1px),
                linear-gradient(to right, rgba(0, 242, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
        }

        .glow-cyan {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .video-mask {
            box-shadow: 0 0 50px -10px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen selection:bg-primary/30">
    <header class="relative overflow-hidden pt-16 pb-12">
        <div class="absolute inset-0 grid-bg pointer-events-none"></div>
        <div class="container mx-auto px-4 relative z-10 text-center">
            <h1
                class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-4 text-slate-900 dark:text-white uppercase">
                CHARTSENTINEL
            </h1>
            <div class="mt-8">
                <span class="font-mono text-primary uppercase tracking-widest text-sm font-bold glow-cyan">Step-1</span>
                <h2 class="text-3xl md:text-4xl font-bold mt-2">
                    WATCH <span class="text-primary glow-cyan">THIS VIDEO</span>
                </h2>
            </div>
        </div>
    </header>
    <main class="container mx-auto px-4 pb-24">
        <div class="max-w-4xl mx-auto mb-20 relative group">
            <div
                class="aspect-video bg-black rounded-2xl overflow-hidden border border-slate-200 dark:border-white/10 video-mask relative flex items-center justify-center cursor-pointer">
                <img alt="Trading Dashboard Video Placeholder"
                    class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-700"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZgZzP8vZZY0IX0dJxEZIxPPFBESlsE8LixLgGxDOgZYepywoEs9bkWPYdH0oe4ChjOeKcObqV4373yYZnD24ILz5FO7gjx_m0kMLWOI5XqmpIwnmk-S2B3NtIT5Eq8oLjdvp2F456M8kIZBy_-MBa85Nly6sTz8WFdoq7zWUXBrRWqJyIjaIpwh2F-niCqo_5NIm2wCF4mGFSICkx7ZXPulXwEh6EWyx4WUb_hTWb8yslmn9FUW2XeCW-LP1YECJvDtxBwGqH0ds" />
                <div
                    class="relative z-10 w-20 h-20 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/20 group-hover:scale-110 transition-transform">
                    <span class="material-icons text-background-dark text-4xl">play_arrow</span>
                </div>
                <div class="absolute top-4 left-4 flex gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                </div>
            </div>
        </div>
        <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-12 items-end">
            <div class="space-y-6">
                <div class="text-4xl md:text-5xl font-extrabold tracking-tight">
                    chart<span class="text-primary glow-cyan">SENTINEL</span>
                </div>
                <p class="text-slate-500 dark:text-slate-400 text-lg max-w-sm leading-relaxed">
                    Change how you read the market, and your results will follow. Trade with structure, clarity, and a
                    real edge.
                </p>
            </div>
            <div
                class="bg-white dark:bg-surface-dark p-8 rounded-2xl border border-slate-200 dark:border-white/5 shadow-2xl">
                <form action="#" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-2"
                            for="name">Name</label>
                        <input
                            class="w-full bg-slate-100 dark:bg-input-dark border-transparent focus:border-primary focus:ring-primary rounded-xl px-4 py-3 text-slate-900 dark:text-white transition-all outline-none"
                            id="name" placeholder="Jane Smith" required="" type="text" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-2"
                            for="email">Email</label>
                        <input
                            class="w-full bg-slate-100 dark:bg-input-dark border-transparent focus:border-primary focus:ring-primary rounded-xl px-4 py-3 text-slate-900 dark:text-white transition-all outline-none"
                            id="email" placeholder="jane@gmail.com" required="" type="email" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-2"
                            for="phone">Phone</label>
                        <input
                            class="w-full bg-slate-100 dark:bg-input-dark border-transparent focus:border-primary focus:ring-primary rounded-xl px-4 py-3 text-slate-900 dark:text-white transition-all outline-none"
                            id="phone" placeholder="+1 9897367890" required="" type="tel" />
                    </div>
                    <button
                        class="w-full bg-slate-200 dark:bg-white/10 hover:bg-primary hover:text-background-dark dark:hover:bg-primary dark:hover:text-background-dark text-slate-900 dark:text-white font-bold py-4 rounded-xl transition-all duration-300 transform active:scale-[0.98]"
                        type="submit">
                        Submit
                    </button>
                </form>
            </div>
        </div>
    </main>
    <footer class="fixed bottom-0 left-0 right-0 p-6 flex justify-end items-center pointer-events-none">
        <a class="pointer-events-auto flex items-center gap-2 bg-primary/10 hover:bg-primary/20 text-primary border border-primary/30 px-6 py-3 rounded-full font-bold transition-all backdrop-blur-md group"
            href="#">
            NEXT
            <span class="material-icons group-hover:translate-x-1 transition-transform">chevron_right</span>
        </a>
    </footer>
    <button
        class="fixed top-6 right-6 w-10 h-10 bg-slate-200 dark:bg-white/10 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-400 hover:text-primary transition-colors z-50"
        onclick="document.documentElement.classList.toggle('dark')">
        <span class="material-icons text-xl">dark_mode</span>
    </button>

</body>

</html>
