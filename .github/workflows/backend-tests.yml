name: backend-tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      # Belt-and-braces: postinstall already runs prisma generate, but
      # cached node_modules can skip it. Forcing it here keeps the
      # generated client in sync with the latest schema (new models
      # like AiUsage / ApiKey) so the engine doesn't panic on import.
      - run: npx prisma generate

      - run: npm test
        env:
          # Vitest setup writes these defaults if unset, but failing
          # Prisma engine init parses them at import — provide explicit
          # placeholders so the engine constructor has something
          # parseable.
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DIRECT_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-secret-which-is-at-least-32-characters!
          NODE_ENV: test
