<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Defaults — per-route overrides are driven by react-helmet-async. -->
    <title>ChartSentinel — Trading intelligence, without the noise.</title>
    <meta
      name="description"
      content="ChartSentinel combines commitment-of-traders positioning, seasonality, and chart-pattern matches into a single composite signal — across FX, crypto, and equities."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://chartsentinel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ChartSentinel" />
    <meta property="og:url" content="https://chartsentinel.app/" />
    <meta property="og:title" content="ChartSentinel — Trading intelligence, without the noise." />
    <meta
      property="og:description"
      content="Composite signals across FX, crypto, and equities. COT positioning, seasonality, and pattern matches — in one dashboard."
    />
    <meta property="og:image" content="https://chartsentinel.app/og-image.png" />
    <meta property="og:image:alt" content="ChartSentinel composite signal dashboard" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChartSentinel — Trading intelligence, without the noise." />
    <meta
      name="twitter:description"
      content="Composite signals across FX, crypto, and equities. COT positioning, seasonality, and pattern matches — in one dashboard."
    />
    <meta name="twitter:image" content="https://chartsentinel.app/og-image.png" />

    <!-- Preconnect so first paint doesn't stall on DNS for third-party origins. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
